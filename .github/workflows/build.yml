name: Build & Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Check translation completeness (EN/VI)
        run: |
          ./gradlew lintDebug --no-daemon || true
          REPORT="app/build/reports/lint-results-debug.txt"
          if [ -f "$REPORT" ] && grep -qE "MissingTranslation|ExtraTranslation" "$REPORT"; then
            echo "Translation completeness check failed — values/ and values-vi/strings.xml are out of sync:"
            grep -E "MissingTranslation|ExtraTranslation" "$REPORT"
            exit 1
          fi
          echo "Translation completeness check passed."

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get version tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename APK with version
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/doc-scanner-${{ steps.tag.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: DocScanner ${{ steps.tag.outputs.version }}
          body: |
            ## DocScanner ${{ steps.tag.outputs.version }}

            ### Cài đặt
            1. Tải file `doc-scanner-${{ steps.tag.outputs.version }}.apk`
            2. Bật "Cài từ nguồn không rõ" trên điện thoại
            3. Cài APK

            > Yêu cầu Android 8.0 (API 26) trở lên
          files: app/build/outputs/apk/debug/doc-scanner-${{ steps.tag.outputs.version }}.apk
          draft: false
          prerelease: false

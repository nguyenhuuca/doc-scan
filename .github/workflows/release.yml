name: Release

# Manually triggered from GitHub UI: tests, builds APK, tags the commit,
# generates changelog, and publishes a GitHub Release.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, without the leading v (e.g. 1.0.0)'
        required: true

permissions:
  contents: write   # needed to create tag and release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags so changelog can diff against previous tag

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Stage APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk \
             "release/doc-scanner-${{ github.event.inputs.version }}.apk"

      - name: Generate release notes
        run: |
          prev_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          {
            echo "## What's Changed"
            echo
            if [ -n "$prev_tag" ]; then
              git log --no-merges --pretty='- %s' "${prev_tag}..HEAD"
              echo
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${prev_tag}...v${{ github.event.inputs.version }}"
            else
              git log --no-merges --pretty='- %s'
            fi
          } > release/notes.md
          cat release/notes.md

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ github.event.inputs.version }}" -m "Release v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "v${{ github.event.inputs.version }}"
          body_path: release/notes.md
          files: release/doc-scanner-${{ github.event.inputs.version }}.apk

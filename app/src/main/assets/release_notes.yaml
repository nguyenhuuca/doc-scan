- version: "1.5.1"
  date: "02/07/2026"
  changes:
    - "Sửa lỗi chỉnh sáng/tương phản: kéo thanh trượt không còn làm ảnh cháy sáng trắng xóa hoặc tối đen kịt — giờ đây phản ánh đúng giá trị đã chọn"

- version: "1.5.0"
  date: "01/07/2026"
  changes:
    - "Hỗ trợ đầy đủ tiếng Việt cho toàn bộ ứng dụng — có thể chuyển đổi Anh/Việt ngay trong Cài đặt, độc lập với ngôn ngữ máy"
    - "Cải thiện hiệu năng khi thêm nhiều trang cùng lúc — xử lý theo lô thay vì từng trang một"
    - "Giảm nguy cơ giật/treo khi chỉnh sửa ảnh có độ phân giải cao"
    - "Sửa lỗi hiển thị trạng thái trang bị thiếu trên màn hình xem tài liệu"

- version: "1.4.0"
  date: "29/06/2026"
  changes:
    - "Cải thiện hiệu năng xử lý ảnh — xoay, điều chỉnh độ sáng/tương phản và cắt phối cảnh giờ chạy mượt hơn, không còn giật lag"
    - "Thanh trượt độ sáng và tương phản phản hồi trực tiếp khi kéo thay vì chờ thả tay"
    - "Sửa nhiều lỗi nội bộ: giới hạn trang/tài liệu hiển thị đúng, xóa trang an toàn hơn, dọn dẹp code không dùng"

- version: "1.3.0"
  date: "29/06/2026"
  changes:
    - "Sửa lỗi cài đặt bản cập nhật — APK release giờ được ký nhất quán, không còn lỗi xung đột khi nâng cấp"

- version: "1.2.0"
  date: "29/06/2026"
  changes:
    - "Import ảnh từ thư viện — thêm trang từ Gallery, không cần chụp lại"
    - "Tìm kiếm tài liệu theo tên (xuất hiện khi có hơn 10 tài liệu)"
    - "Sắp xếp danh sách theo ngày hoặc theo tên A-Z"

- version: "1.1.0"
  date: "29/06/2026"
  changes:
    - "Mục \"Có gì mới\" ngay trong ứng dụng — xem lịch sử cập nhật tại Settings"
    - "Xuất PDF nhanh hơn và nhỏ hơn — JPEG được nhúng trực tiếp, không giải mã lại"
    - "Sửa lỗi chỉnh sửa ảnh: xoay và undo chạy trên background thread, không giật"
    - "Sửa lỗi thanh trượt độ sáng/tương phản — debounce 300ms, không lag khi kéo nhanh"

- version: "1.0.1"
  date: "28/06/2026"
  changes:
    - "Sửa lỗi build CI — không ảnh hưởng đến chức năng"

- version: "1.0.0"
  date: "28/06/2026"
  changes:
    - "Quét tài liệu bằng camera với nhận dạng viền tự động (ML Kit)"
    - "Chế độ crop thủ công cho thiết bị không có Google Play Services"
    - "Chỉnh sửa ảnh: xoay, độ sáng, độ tương phản, thang xám"
    - "Undo tối đa 5 bước khi chỉnh sửa"
    - "Ghép nhiều trang thành một tài liệu, kéo thả để sắp xếp lại"
    - "Xuất PDF và chia sẻ qua Gmail, Zalo"
    - "Quản lý tài liệu: đổi tên, xóa, xem thumbnail"
    - "Lưu trữ riêng tư trên thiết bị — không cần internet, không cần tài khoản"
